<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
margin:0;
background:black;
overflow:hidden;
}

video{
width:100vw;
height:100vh;
object-fit:cover;
}
</style>

</head>

<body>

<video
autoplay
muted
playsinline
controls="false">
<source src="video.mp4" type="video/mp4">
</video>

<script>
const video=document.querySelector("video");
video.controls=false;
video.play();
</script>

</body>
</html>
