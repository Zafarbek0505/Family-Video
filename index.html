<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Memories</title>
<style>
html, body {
  margin: 0;
  background: black;
  font-family: Arial, sans-serif;
}
#start {
  position: fixed;
  inset: 0;
  background: black;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}
button {
  font-size: 22px;
  padding: 18px 40px;
  border: 0;
  border-radius: 40px;
}
video {
  width: 100vw;
  height: 100vh;
  background: black;
  display: none;
}
</style>
</head>
<body>

<div id="start">
  <button onclick="startVideo()">Open Video</button>
</div>

<video id="video" controls playsinline>
  <source src="./video.mp4.mp4" type="video/mp4">
</video>

<script>
function startVideo() {
  const start = document.getElementById("start");
  const video = document.getElementById("video");

  start.style.display = "none";
  video.style.display = "block";

  video.play();

  if (video.requestFullscreen) {
    video.requestFullscreen();
  }
}
</script>

</body>
</html>
