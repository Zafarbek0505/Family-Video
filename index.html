<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Memories</title>
<style>
html, body { margin:0; background:#111; font-family:Arial,sans-serif; }
#start { position:fixed; inset:0; background:black; display:flex; align-items:center; justify-content:center; z-index:10; }
button { font-size:22px; padding:18px 40px; border:0; border-radius:40px; }
video { width:100vw; height:100vh; background:black; display:none; }
#gallery { display:none; padding:10px; columns:3 250px; column-gap:10px; }
#gallery img { width:100%; margin-bottom:10px; border-radius:12px; display:block; }
</style>
</head>
<body>

<div id="start">
  <button onclick="startVideo()">Open Video</button>
</div>

<video id="video" controls playsinline>
  <source src="./video.mp4.mp4" type="video/mp4">
</video>

<div id="gallery"></div>

<script>
const video = document.getElementById("video");
const gallery = document.getElementById("gallery");

function startVideo() {
  document.getElementById("start").style.display = "none";
  video.style.display = "block";
  video.play();
  if (video.requestFullscreen) video.requestFullscreen();
}

async function showGallery() {
  if (document.fullscreenElement) document.exitFullscreen();
  video.style.display = "none";
  gallery.style.display = "block";
  gallery.innerHTML = "";

  const res = await fetch("https://api.github.com/repos/Zafarbek0505/Family-Video/contents/images");
  const files = await res.json();

  files
    .filter(file => file.name.toLowerCase().endsWith(".jpg"))
    .forEach(file => {
      const img = document.createElement("img");
      img.src = file.download_url;
      img.loading = "lazy";
      gallery.appendChild(img);
    });
}

video.addEventListener("ended", showGallery);
</script>

</body>
</html>
