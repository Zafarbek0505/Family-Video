<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Memories</title>
<style>
html, body {
  margin: 0;
  background: black;
  font-family: Arial, sans-serif;
}

#start {
  position: fixed;
  inset: 0;
  background: black;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

button {
  font-size: 22px;
  padding: 18px 40px;
  border: 0;
  border-radius: 40px;
}

video {
  width: 100vw;
  height: 100vh;
  background: black;
  display: none;
}

#gallery {
  display: none;
  background: #111;
  padding: 10px;
  columns: 3 250px;
  column-gap: 10px;
}

#gallery img {
  width: 100%;
  margin-bottom: 10px;
  border-radius: 12px;
}
</style>
</head>
<body>

<div id="start">
  <button onclick="startVideo()">Open Video</button>
</div>

<video id="video" controls playsinline>
  <source src="./video.mp4.mp4" type="video/mp4">
</video>

<div id="gallery"></div>

<script>
const imageNames = [
"4A4A0016-39.jpg",
"4A4A0071-38.jpg",
"4A4A0094-37.jpg",
"4A4A0112-36.jpg",
"4A4A0120-35.jpg",
"4A4A0125-34.jpg",
"4A4A0128-33.jpg",
"4A4A0142-32.jpg",
"4A4A0146-31.jpg",
"4A4A0150-30.jpg",
"4A4A0154-29.jpg",
"4A4A0200-28.jpg",
"4A4A0206-27.jpg",
"4A4A0211-26.jpg",
"4A4A0215-25.jpg",
"4A4A0228-24.jpg",
"4A4A0232-23.jpg",
"4A4A0251-22.jpg",
"4A4A0259-21.jpg"
];

function startVideo() {
  const start = document.getElementById("start");
  const video = document.getElementById("video");

  start.style.display = "none";
  video.style.display = "block";
  video.play();

  if (video.requestFullscreen) {
    video.requestFullscreen();
  }
}

document.getElementById("video").onended = function () {
  if (document.fullscreenElement) {
    document.exitFullscreen();
  }

  this.style.display = "none";

  const gallery = document.getElementById("gallery");
  gallery.style.display = "block";

  imageNames.forEach(name => {
    const img = document.createElement("img");
    img.src = "./images/" + name;
    img.loading = "lazy";
    gallery.appendChild(img);
  });
};
</script>

</body>
</html>
